
{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Add Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>ShadeStore</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body>
    {% include 'inc/navbar2.html' %}
    <!-- In your ecom base template -->
    {% if messages %}
    <div class="message-container">
        {% for message in messages %}
            <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}
    {% endblock content %}

    {% block scripts %}
    {% endblock scripts %}
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
      // Check for order success message in sessionStorage
      document.addEventListener('DOMContentLoaded', function() {
          if (sessionStorage.getItem('orderSuccess') === 'true') {
              // Create a Bootstrap success alert
              const alertDiv = document.createElement('div');
              alertDiv.className = 'alert alert-success alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-4';
              alertDiv.style.zIndex = '9999';
              alertDiv.role = 'alert';
              
              // Set the success message
              alertDiv.innerHTML = `
                  <strong>Success!</strong> Order placed successfully!
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              `;
              
              // Add to the body
              document.body.appendChild(alertDiv);
              
              // Auto dismiss after 5 seconds
              setTimeout(function() {
                  const bsAlert = new bootstrap.Alert(alertDiv);
                  bsAlert.close();
              }, 5000);
              
              // Remove from sessionStorage so it doesn't show again on refresh
              sessionStorage.removeItem('orderSuccess');
              sessionStorage.removeItem('orderId');
          }
      });
      </script>
   
  </body>
</html>
